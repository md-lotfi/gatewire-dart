name: gatewire_dart
description: "Official Flutter SDK for the GateWire decentralized SMS infrastructure."
version: 1.0.12
homepage: https://gatewire.net

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  ussd_launcher: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Declares gatewire_dart as a Flutter plugin so its android/AndroidManifest.xml
  # participates in the consuming app's manifest merger. This automatically injects
  # the Android 14+ foreground service type fix for ussd_launcher's UssdOverlayService.
  plugin:
    platforms:
      android:
        package: net.gatewire.gatewire_dart
        pluginClass: GatewireDartPlugin
